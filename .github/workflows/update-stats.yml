name: Update README Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Analytics Metrics
        uses: lowlighter/metrics@latest
        with:
          # This maps your repository's GH_TOKEN secret right into the action
          token: ${{ secrets.GH_TOKEN }}
          
          # This saves the graphic file right into your repository
          filename: github-metrics.svg
          
          # Features to include
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
