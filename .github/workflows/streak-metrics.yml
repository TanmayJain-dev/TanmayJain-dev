name: GitHub Profile Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Card 1: Core GitHub Stats
      - name: General Stats Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: github-stats.svg
          base: header, activity, community, repositories
          config_order: header, activity, community, repositories

      # Card 2: Clean Languages Chart
      - name: Top Languages Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: github-languages.svg
          base: "" # Disables the giant profile header on this card
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          plugin_languages_ignored: html, css # Hides non-programming markup
